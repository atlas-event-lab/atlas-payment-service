server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html

spring:
  application:
    name: payment-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payment_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/atlas}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        spring.json.add.type.headers: 'false'
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.json.trusted.packages: 'com.atlas.payment.event'
        spring.json.value.default.type: com.atlas.payment.event.EventEnvelope
        spring.json.use.type.headers: 'false'

atlas:
  outbox:
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:2000}
  payment:
    provider:
      # Fake Payment Provider (WireMock). See services/payment/service.md §Provider Call.
      base-url: ${PAYMENT_PROVIDER_URL:http://localhost:8081}
      # Per-call timeout (service.md): a provider call exceeding this is a transient TIMEOUT.
      timeout: ${PAYMENT_PROVIDER_TIMEOUT:5s}
      # Total attempts = 1 initial + 2 retries (service.md). Transient failures only are retried.
      max-attempts: ${PAYMENT_PROVIDER_MAX_ATTEMPTS:3}
      # Wait BEFORE each attempt; index 0 = first attempt (0s), then 2s, then 5s (service.md).
      backoff: ${PAYMENT_PROVIDER_BACKOFF:0s,2s,5s}

management:
  server:
    port: 9090
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://tempo.atlas-observability:4318/v1/traces}
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

logging:
  level:
    com.atlas: INFO
    org.springframework.security: WARN
